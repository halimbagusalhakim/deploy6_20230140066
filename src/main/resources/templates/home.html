<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f0f0; padding: 20px; }
        h2 { color: #333; }
        a { color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        thead { background-color: #007bff; color: white; }
        th, td { padding: 10px; text-align: center; border: 1px solid #ddd; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="container">
    <h2>MY Website 12345678</h2> <!-- Ganti 12345678 dengan NIM kamu -->
    <p>Selamat datang di aplikasi!</p>
    <a th:href="@{/form}">+ Input Data Mahasiswa</a>

    <h3>Data Mahasiswa</h3>
    <table>
        <thead>
        <tr>
            <th>No</th>
            <th>Nama</th>
            <th>NIM</th>
            <th>Jenis Kelamin</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(userList)}">
            <td colspan="4">Belum ada data</td>
        </tr>
        <tr th:each="u, stat : ${userList}">
            <td th:text="${stat.index + 1}"></td>
            <td th:text="${u.nama}"></td>
            <td th:text="${u.nim}"></td>
            <td th:text="${u.jenisKelamin}"></td>
        </tr>
        </tbody>
    </table>

    <br>
    <a th:href="@{/logout}">Logout</a>
</div>
</body>
</html>
