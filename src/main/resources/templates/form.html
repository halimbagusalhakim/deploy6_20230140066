<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Form Input — MY Website</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="topbar">
    <div class="topbar-left">
        <div class="topbar-logo">M</div>
        <span class="topbar-brand">MY Website</span>
    </div>
    <span class="topbar-nim">NIM: 20210140019</span>
</nav>

<div class="form-page-wrap">
    <div class="card">

        <div class="form-card-top">
            <div class="form-card-icon">&#128100;</div>
            <div>
                <div class="form-card-title">Form Input Mahasiswa</div>
                <div class="form-card-sub">Isi data mahasiswa dengan benar dan lengkap.</div>
            </div>
        </div>

        <form th:action="@{/form}" th:object="${user}" method="post">
            <div class="form-group">
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" th:field="*{nama}"
                       placeholder="Contoh: Budi Santoso" required/>
            </div>

            <div class="form-group">
                <label for="nim">NIM</label>
                <input type="text" id="nim" th:field="*{nim}"
                       placeholder="Contoh: 20210140001" required/>
            </div>

            <div class="form-group">
                <label>Jenis Kelamin</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" th:field="*{jenisKelamin}" value="Laki-laki" required/>
                        <span>&#9794; Laki-laki</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" th:field="*{jenisKelamin}" value="Perempuan"/>
                        <span>&#9792; Perempuan</span>
                    </label>
                </div>
            </div>

            <div class="form-actions" style="margin-top: 24px;">
                <button type="submit" class="btn btn-primary">Simpan Data</button>
                <a th:href="@{/home}" class="btn btn-outline">Kembali</a>
            </div>
        </form>

    </div>
</div>
</body>
</html>
