<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form Input Mahasiswa</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f0f0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"] {
            width: 100%; padding: 8px; margin-bottom: 15px;
            border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        .radio-group { margin-bottom: 15px; }
        .radio-group label { font-weight: normal; display: inline; margin-left: 5px; }
        button { background-color: #007bff; color: white; padding: 9px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        a { display: block; margin-top: 10px; color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <h2>Form Input Mahasiswa</h2>
    <form th:action="@{/form}" th:object="${user}" method="post">
        <label>Nama:</label>
        <input type="text" th:field="*{nama}" required />

        <label>NIM:</label>
        <input type="text" th:field="*{nim}" required />

        <label>Jenis Kelamin:</label>
        <div class="radio-group">
            <input type="radio" th:field="*{jenisKelamin}" value="Laki-laki" id="lakiLaki" />
            <label for="lakiLaki">Laki-laki</label><br>
            <input type="radio" th:field="*{jenisKelamin}" value="Perempuan" id="perempuan" />
            <label for="perempuan">Perempuan</label>
        </div>

        <button type="submit">Submit</button>
    </form>
    <a th:href="@{/home}">Kembali ke Home</a>
</div>
</body>
</html>
